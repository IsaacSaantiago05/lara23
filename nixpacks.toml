[phases.install]
cmds = [
  "composer install --no-interaction --prefer-dist --optimize-autoloader"
]

[phases.build]
cmds = [
  "npm ci",
  "npm run build"
]

[start]
cmd = "php artisan config:clear && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_mysql", "nodejs_20", "npm-10_x", "composer"]

[phases.install]
cmds = [
 "composer install --no-dev --optimize-autoloader --no-interaction --no-scripts",
 "npm ci",
 "@php artisan package:discover --ansi"
]

[phases.build]
cmds = [
 "npm run build",
 "php artisan config:clear"
]

[start]
cmd = "sh -c 'php artisan serve --host=0.0.0.0 --port=${PORT:-8080}'"